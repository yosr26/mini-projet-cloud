name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Étape 1 : Build et Push de l'image Docker ────────────────────────────────
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Récupérer le code
        uses: actions/checkout@v3

      - name: 🔐 Se connecter à Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🏗️ Build et Push de l'image Flask
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/todo-flask:latest

  # ── Étape 2 : Test de l'application ─────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: 📥 Récupérer le code
        uses: actions/checkout@v3

      - name: 🐳 Lancer docker compose
        run: |
          docker compose up -d
          sleep 20   # Attendre que tous les services démarrent

      - name: ✅ Tester l'endpoint health
        run: |
          curl -f http://localhost/health || exit 1

      - name: 🧪 Tester GET /tasks
        run: |
          curl -f http://localhost/tasks || exit 1

      - name: 🧪 Tester POST /tasks
        run: |
          curl -f -X POST http://localhost/tasks \
            -H "Content-Type: application/json" \
            -d '{"title": "Test CI/CD"}' || exit 1

      - name: 🛑 Arrêter les conteneurs
        run: docker compose down
